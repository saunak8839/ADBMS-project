# Orchestrates Kafka, Postgres, Neo4j, Redis
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: telecom_postgres
    environment:
      POSTGRES_USER: telecom_user
      POSTGRES_PASSWORD: telecom_password
      POSTGRES_DB: telecom_db
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - telecom-network

  kafka:
    image: confluentinc/confluent-local:7.5.0
    container_name: telecom_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - telecom-network
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: telecom_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse:/docker-entrypoint-initdb.d
    networks:
      - telecom-network

  neo4j:
    image: neo4j:5.18.0
    container_name: telecom_neo4j
    environment:
      NEO4J_AUTH: neo4j/telecom_password
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - telecom-network

  redis:
    image: redis:7-alpine
    container_name: telecom_redis
    ports:
      - "6379:6379"
    networks:
      - telecom-network

networks:
  telecom-network:
    driver: bridge
