# Orchestrates Kafka, Postgres, Neo4j, Redis - Optimized for Stability
services:
  postgres:
    image: postgres:15-alpine
    container_name: telecom_postgres
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      POSTGRES_USER: telecom_user
      POSTGRES_PASSWORD: telecom_password
      POSTGRES_DB: telecom_db
    command: ["postgres", "-c", "shared_buffers=64MB", "-c", "max_connections=50"]
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - telecom-network

  kafka:
    image: confluentinc/confluent-local:7.5.0
    container_name: telecom_kafka
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms128M"
    networks:
      - telecom-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: telecom_clickhouse
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse:/docker-entrypoint-initdb.d
    networks:
      - telecom-network

  neo4j:
    image: neo4j:5.18.0
    container_name: telecom_neo4j
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      NEO4J_AUTH: neo4j/telecom_password
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 128m
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - telecom-network

  redis:
    image: redis:7-alpine
    container_name: telecom_redis
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "6379:6379"
    networks:
      - telecom-network

networks:
  telecom-network:
    driver: bridge
